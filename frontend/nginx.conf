server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the FastAPI backend (same-origin → no CORS issues)
    location /api/ {
        proxy_pass http://goldia_backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Expo Router web is a SPA: fall back to index.html for client routes
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}
